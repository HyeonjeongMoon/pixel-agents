openapi: 3.1.0
info:
  title: Agent Dashboard API
  version: 1.0.0
  description: |
    독립 웹뷰/대시보드를 위한 상태 스냅샷 + 이벤트 스트림 API.
servers:
  - url: http://localhost:3000
paths:
  /api/v1/state:
    get:
      summary: 현재 전체 상태 스냅샷
      operationId: getState
      responses:
        '200':
          description: 상태 스냅샷
          content:
            application/json:
              schema:
                $ref: '../schemas/state-snapshot.schema.json'
  /api/v1/layout:
    get:
      summary: 현재 레이아웃 메타 정보
      operationId: getLayout
      responses:
        '200':
          description: 레이아웃
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                  layout:
                    type: object
                required: [run_id, layout]
  /api/v1/events:
    get:
      summary: 이벤트 목록(폴링/리플레이용)
      operationId: listEvents
      parameters:
        - in: query
          name: after_seq
          schema:
            type: integer
            minimum: 0
          description: 주어진 seq 이후 이벤트만 반환
      responses:
        '200':
          description: 이벤트 배열
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas/event-envelope.schema.json'
  /api/v1/stream:
    get:
      summary: 단순 SSE 스트림(데모)
      operationId: streamEvents
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream:
              schema:
                type: string
components: {}
